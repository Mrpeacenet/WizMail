<!DOCTYPE html> 
<html>
    <head>
        <link rel="icon" type="image/png" href="/DESIGN SUM/Images/Website Title Logo PNG.png">

        <link rel="stylesheet" href="Sign Up.css">
        <!-- Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

    </head>
    <body>
        <section>
            <div class="signup-container">
                <div class="signup-box">
                    <div class="signup-logo-container">
                        <img class="signup-logo" src="/DESIGN SUM/Images/Website Title Logo.svg">
                    </div>
                    <div class="signup-title">
                        Create an Account
                    </div>
                    <div>
                        <form action="Admin.html">
                            <div class="input-group">
                                <label>Full Name</label>
                                <input type="text" placeholder="Enter your full name">
                            </div>
                            <div class="input-group">
                                <label>Email Address</label>
                                <input type="email" placeholder="Enter your email">
                            </div>
                            <div class="input-group">
                                <label>Password</label>
                                <input type="password" placeholder="Enter a strong password">
                            </div>
                            <div>
                                <button class="signup-button">
                                    Create Account
                                </button>
                            </div>
                        </form>
                        <form>
                            <div class="signin-container">
                                <div class="sign-text">
                                Already have an account? 
                                </div>
                                <a class="signin-link" href="#">
                                    Sign In
                                </a>
                            </div>
                        </form>
                            <div class="back-option">
                                <a href="/DESIGN SUM/Home.html">
                                <svg class="back-arrow-icon "xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                                </svg>
                                </a>
                            </div>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
