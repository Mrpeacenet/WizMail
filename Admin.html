<!DOCTYPE html>
<html>
    <head>
        <!-- CSS Stylesheet -->
        <link rel="stylesheet" href="Admin.css">
        <!-- JavaScript -->
        <script src="Admin.js" defer></script>
        <!-- Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <!-- Alexandria Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <!-- Inter Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <section>
            <div class="nav_bar-section">
                <div class="nav_bar-filter-button" id="dropdownButton">
                    <svg width="24" height="24" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 12H56L38 34V52L26 56V34L8 12Z" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="nav_bar-profile">
                        <span class="nav_bar-profile-text">
                            User12345
                        </span>
                        <svg class="nav_bar-profile-icon" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M20 21a8 8 0 0 0-16 0"/>
                        </svg>
                </div>  
            </div>  
                    
        </section>

        <section>

            <div class="filter_bar-section" id="dropdownMenu">
                    <div class="filter_bar-option-button">
                        General
                    </div>
                    <div class="filter_bar-option-button">
                        Academics
                    </div>
                    <div class="filter_bar-option-button">
                        Events
                    </div>
                    <div class="filter_bar-option-button">
                        Athletics
                    </div>
            </div>

        </section>
        
<!-- Side_bar -->
        <section>

            <div class="side_bar-section">

                <div>

                    <img src="Images/Website Title Logo.svg" class="side_bar-logo">


                    <svg width="24" height="24" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path 
                            d="M12 20H52M12 32H52M12 44H52" 
                            stroke="currentColor" 
                            stroke-width="4" 
                            stroke-linecap="round" 
                            stroke-linejoin="round"
                        />
                    </svg>
                </div>


                <div class="side_bar-option">

                    <svg class="side_bar-icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg> 

                    <span class="side_bar-text">
                        Mail
                    </span>

                </div>
                <div class="side_bar-option">

                    <svg class="side_bar-icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="4,9 4,15 10,17 10,7 4,9"></polygon>
                        <path d="M10 7 L20 4 L20 20 L10 17"></path>
                        <path d="M7 17 L7 20 L10 20"></path>
                    </svg>

                    <span class="side_bar-text">
                        Announce
                    </span>

                </div>

                <div class="side_bar-option">
                    <svg class="side_bar-icons" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>

                    <span class="side_bar-text">
                        Chat
                    </span>
                </div>


                <div class="side_bar-log_out">
                    <a href="Home.html">
                    <button class="side_bar-log_out-button">
                        Log Out
                    </button>
                    </a>
                </div>


            </div>

        </section>

<!-- Announcement space -->
        <section>
            <div id="announcementFeed"></div>
        </section>

<!-- Announce post box -->
        <section>
            <div class="announce-section">
                    
                        <form class="announce-container">
                            
                            <div class="announce-text">
                                <input class="announce-title" id="announcementTitle" type="text" placeholder="Title">
                                <textarea class="announce-description" id="announcementDescription" placeholder="Description" style="resize: none;"></textarea>
                            </div>
                            
                            <div class="announce-post">
                                <button class="announce-button-link">
                                    <svg 
                                        xmlns="http://www.w3.org/2000/svg" 
                                        width="20" 
                                        height="20" 
                                        viewBox="0 0 24 24" 
                                        fill="none" 
                                        stroke="currentColor" 
                                        stroke-width="2.5" 
                                        stroke-linecap="round" 
                                        stroke-linejoin="round"
                                    >
                                        <path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 1 0-7.07-7.07L11 5"/>
                                        <path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 1 0 7.07 7.07L13 19"/>
                                    </svg>
                                </button>
                                <div class="announce-advice">
                                    Announce anything!
                                </div>
                                <button class="announce-button-send" id="postButton" type="submit">
                                    <svg class="announce-send_icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 3L5 10"/>
                                        <path d="M12 3L19 10"/>
                                        <path d="M12 3L12 21"/>
                                    </svg>
                                </button>
                            </div>

                        </form>
            </div>
        </section>



    </body>

</html>
